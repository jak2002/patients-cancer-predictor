<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Patient</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            display: flex;
        }
        .sidebar {
            min-width: 220px;
            max-width: 220px;
            background-color: #0d6efd;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 1rem;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 0.75rem 1rem;
        }
        .sidebar a:hover {
            background-color: #0b5ed7;
        }
        .sidebar a.active {
            background-color: #084298;
            font-weight: bold;
        }
        .content {
            margin-left: 220px;
            padding: 2rem;
            width: calc(100% - 220px);
        }
    </style>
</head>
<body class="bg-light">

    <!-- Sidebar -->
    <div class="sidebar">
        <h4 class="text-center mb-4">Breast Cancer Predictor</h4>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{{ url_for('register_patient') }}" class="{% if request.endpoint == 'register_patient' %}active{% endif %}">
                <i class="bi bi-person-plus"></i> Register Patient
            </a>
            <a href="{{ url_for('logout') }}">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        {% else %}
            <a href="{{ url_for('login') }}" class="{% if request.endpoint == 'login' %}active{% endif %}">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a href="{{ url_for('register_doctor') }}" class="{% if request.endpoint == 'register_doctor' %}active{% endif %}">
                <i class="bi bi-person-badge"></i> Register Doctor
            </a>
        {% endif %}
    </div>

    <!-- Content -->
    <div class="content">
        <h2>Edit Patient</h2>
        <form method="POST" class="card p-4 shadow-sm">
            <!-- Demographics -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ patient.email }}" required>
            </div>

            <!-- Medical Data -->
            <div class="mb-3">
                <label class="form-label">Medical Data (Notes)</label>
                <textarea name="medical_data" class="form-control" rows="4">{{ patient.medical_data }}</textarea>
            </div>

            <!-- Medical Features -->
            <h5 class="mt-4">Medical Features</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Radius Mean</label>
                    <input type="number" step="any" name="radius_mean" class="form-control" value="{{ patient.radius_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Texture Mean</label>
                    <input type="number" step="any" name="texture_mean" class="form-control" value="{{ patient.texture_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Perimeter Mean</label>
                    <input type="number" step="any" name="perimeter_mean" class="form-control" value="{{ patient.perimeter_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Area Mean</label>
                    <input type="number" step="any" name="area_mean" class="form-control" value="{{ patient.area_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Smoothness Mean</label>
                    <input type="number" step="any" name="smoothness_mean" class="form-control" value="{{ patient.smoothness_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Compactness Mean</label>
                    <input type="number" step="any" name="compactness_mean" class="form-control" value="{{ patient.compactness_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Concavity Mean</label>
                    <input type="number" step="any" name="concavity_mean" class="form-control" value="{{ patient.concavity_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Concave Points Mean</label>
                    <input type="number" step="any" name="concave_points_mean" class="form-control" value="{{ patient.concave_points_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Symmetry Mean</label>
                    <input type="number" step="any" name="symmetry_mean" class="form-control" value="{{ patient.symmetry_mean }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Fractal Dimension Mean</label>
                    <input type="number" step="any" name="fractal_dimension_mean" class="form-control" value="{{ patient.fractal_dimension_mean }}">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
