<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Medical Data</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar a {
            color: #fff;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
            color: #fff;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3">
        <h4 class="text-center mb-4">Dashboard</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="{{ url_for('dashboard') }}" class="nav-link">
                    <i class="bi bi-speedometer2"></i> Home
                </a>
            </li>
            <li>
                <a href="{{ url_for('patients') }}" class="nav-link">
                    <i class="bi bi-people"></i> Patients
                </a>
            </li>
            <li>
                <a href="{{ url_for('reports') }}" class="nav-link">
                    <i class="bi bi-file-earmark-text"></i> Reports
                </a>
            </li>
            <li>
                <a href="{{ url_for('logout') }}" class="nav-link">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h2 class="mb-4">Add Medical Data for {{ patient.name }}</h2>

        <form method="POST" action="{{ url_for('add_medical_data', patient_id=patient.id) }}">
            <div class="row g-3">
                <!-- Example fields -->
                <div class="col-md-4">
                    <label class="form-label">Radius Mean</label>
                    <input type="number" step="any" name="radius_mean" class="form-control" value="{{ patient.radius_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Texture Mean</label>
                    <input type="number" step="any" name="texture_mean" class="form-control" value="{{ patient.texture_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Perimeter Mean</label>
                    <input type="number" step="any" name="perimeter_mean" class="form-control" value="{{ patient.perimeter_mean or '' }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Area Mean</label>
                    <input type="number" step="any" name="area_mean" class="form-control" value="{{ patient.area_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Smoothness Mean</label>
                    <input type="number" step="any" name="smoothness_mean" class="form-control" value="{{ patient.smoothness_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Compactness Mean</label>
                    <input type="number" step="any" name="compactness_mean" class="form-control" value="{{ patient.compactness_mean or '' }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Concavity Mean</label>
                    <input type="number" step="any" name="concavity_mean" class="form-control" value="{{ patient.concavity_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Concave Points Mean</label>
                    <input type="number" step="any" name="concave_points_mean" class="form-control" value="{{ patient.concave_points_mean or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Symmetry Mean</label>
                    <input type="number" step="any" name="symmetry_mean" class="form-control" value="{{ patient.symmetry_mean or '' }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Fractal Dimension Mean</label>
                    <input type="number" step="any" name="fractal_dimension_mean" class="form-control" value="{{ patient.fractal_dimension_mean or '' }}" required>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> Save Medical Data
                </button>
                <a href="{{ url_for('patients') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Patients
                </a>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
